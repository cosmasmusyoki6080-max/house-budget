<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Manager - Expenses</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="sidebar">
        <h2>Finance Manager</h2>
        <ul>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="income.html">Income</a></li>
            <li><a href="expenses.html" class="active">Expenses</a></li>
            <li><a href="budgets.html">Budgets</a></li>
            <li><a href="savings.html">Savings</a></li>
            <li><a href="debts.html">Debts</a></li>
            <li><a href="investments.html">Investments</a></li>
            <li><a href="analytics.html">Analytics</a></li>
            <li><a href="reports.html">Reports</a></li>
            <li><a href="settings.html">Settings</a></li>
        </ul>
    </div>
    <div class="main-content">
        <h1>Expense Tracker</h1>
        <form id="expense-form">
            <input type="text" id="name" placeholder="Expense Name" required>
            <input type="number" id="amount" placeholder="Amount" required>
            <select id="category" required>
                <option value="">Select Category</option>
                <option value="Food">Food</option>
                <option value="Transport">Transport</option>
                <option value="Rent">Rent</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Bills">Bills</option>
                <option value="Shopping">Shopping</option>
            </select>
            <input type="date" id="date" required>
            <button type="submit">Add Expense</button>
        </form>
        <table id="expense-table">
            <thead>
                <tr>
                    <th>Expense</th>
                    <th>Category</th>
                    <th>Amount</th>
                    <th>Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    <script src="js/expenses.js"></script>
</body>
</html>
