<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Manager - Investments</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="sidebar">
        <h2>Finance Manager</h2>
        <ul>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="income.html">Income</a></li>
            <li><a href="expenses.html">Expenses</a></li>
            <li><a href="budgets.html">Budgets</a></li>
            <li><a href="savings.html">Savings</a></li>
            <li><a href="debts.html">Debts</a></li>
            <li><a href="investments.html" class="active">Investments</a></li>
            <li><a href="analytics.html">Analytics</a></li>
            <li><a href="reports.html">Reports</a></li>
            <li><a href="settings.html">Settings</a></li>
        </ul>
    </div>
    <div class="main-content">
        <h1>Investment Tracker</h1>
        <form id="investment-form">
            <input type="text" id="investment" placeholder="Investment Name" required>
            <input type="number" id="amount" placeholder="Invested Amount" required>
            <input type="number" id="current" placeholder="Current Value" required>
            <button type="submit">Add Investment</button>
        </form>
        <table id="investment-table">
            <thead>
                <tr>
                    <th>Investment</th>
                    <th>Amount</th>
                    <th>Profit/Loss</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    <script src="js/investments.js"></script>
</body>
</html>
